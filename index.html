<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KI Insider – KI-News und Tools, auf Deutsch, auf den Punkt.</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #111;
      border: 3px solid #f5c800;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 900;
      color: #f5c800;
      letter-spacing: -1px;
      margin-bottom: 28px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #f5c800;
      margin-bottom: 12px;
      text-align: center;
    }
    .tagline {
      font-size: 1.05rem;
      color: #aaa;
      text-align: center;
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 48px;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-yt  { background: #ff0000; color: #fff; }
    .btn-ig  { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); color: #fff; }
    .btn-tt  { background: #010101; color: #fff; border: 1px solid #333; }
    footer {
      margin-top: auto;
      padding-top: 32px;
      font-size: 0.82rem;
      color: #555;
      text-align: center;
    }
    footer a { color: #666; text-decoration: none; }
    footer a:hover { color: #999; }
  </style>
</head>
<body>
  <div class="logo">KI</div>
  <h1>KI Insider</h1>
  <p class="tagline">KI-News und Tools – auf Deutsch, auf den Punkt.<br>Wöchentlich neue Videos über künstliche Intelligenz.</p>

  <div class="links">
    <a class="btn btn-yt" href="https://www.youtube.com/@kiinsiderde" target="_blank" rel="noopener">YouTube</a>
    <a class="btn btn-ig" href="https://www.instagram.com/kiinsiderde" target="_blank" rel="noopener">Instagram</a>
    <a class="btn btn-tt" href="https://www.tiktok.com/@kiinsiderde" target="_blank" rel="noopener">TikTok</a>
  </div>

  <footer>
    <a href="/privacy-policy.html">Datenschutzrichtlinie</a> &nbsp;·&nbsp;
    © 2026 KI Insider · Dennis Schütz &nbsp;·&nbsp;
    <a href="mailto:kiinsider.yt@gmail.com">kiinsider.yt@gmail.com</a>
  </footer>
</body>
</html>
