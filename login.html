<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mit TikTok anmelden - KI Insider</title>
  <link rel="icon" type="image/jpeg" href="/logo.jpg">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0a0a0a;color:#f0f0f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
    .logo{width:90px;height:90px;border-radius:50%;margin-bottom:24px;object-fit:cover}
    h1{font-size:1.6rem;font-weight:800;color:#f5c800;margin-bottom:12px}
    .desc{color:#aaa;max-width:400px;line-height:1.6;margin-bottom:36px;font-size:.98rem}
    .btn-connect{display:inline-block;padding:15px 32px;border-radius:8px;font-size:1rem;font-weight:700;text-decoration:none;background:#f5c800;color:#111;transition:opacity .15s;margin-bottom:20px}
    .btn-connect:hover{opacity:.85}
    .scopes{font-size:.82rem;color:#555;max-width:380px;line-height:1.7;margin-bottom:40px}
    .back{font-size:.85rem;color:#555;text-decoration:none}
    .back:hover{color:#999}
  </style>
</head>
<body>
  <img class="logo" src="/logo.jpg" alt="KI Insider Logo">
  <h1>Mit TikTok anmelden</h1>
  <p class="desc">Verbinde dein TikTok-Konto mit KI Insider, um automatisch Content hochzuladen und deine Videos zu verwalten.</p>
  <a class="btn-connect" href="https://www.tiktok.com/v2/auth/authorize/?client_key=awlkblmccotf7y9k&response_type=code&scope=video.publish%2Cvideo.upload&redirect_uri=https%3A%2F%2Fdennissch3112.github.io%2Fcallback.html&state=kiinsider2026">Mit TikTok verbinden</a>
  <p class="scopes">
    Benoetigte Berechtigungen:<br>
    <strong>video.publish</strong> - Videos veroeffentlichen<br>
    <strong>video.upload</strong> - Videos hochladen
  </p>
  <a class="back" href="/">Zurueck zur Startseite</a>
</body>
</html>
